name: Daily Job Scan

on:
  # Daily at 12:00 UTC = 07:00 ET (08:00 ET during daylight savings).
  # Adjust the cron if you want a different time. Format: m h d-of-mo mo d-of-wk.
  schedule:
    - cron: '0 12 * * *'
  # Lets you trigger a run manually from the Actions tab.
  workflow_dispatch:

permissions:
  # Required so the workflow can commit the updated seen_jobs.json back.
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job scan
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          cd src
          python main.py

      - name: Commit updated seen-jobs state
        run: |
          git config user.name "job-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/seen_jobs.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update seen jobs state [skip ci]"
            git push
          fi
